<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easter Play - Interactive Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 40px;
      opacity: 0.9;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 400px;
      margin: 0 auto;
    }

    a {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 20px 30px;
      border-radius: 15px;
      text-decoration: none;
      color: white;
      font-size: 1.3rem;
      transition: all 0.3s;
      border: 2px solid rgba(255,255,255,0.3);
    }

    a:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    .icon {
      font-size: 1.5rem;
      margin-right: 10px;
    }

    .info {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐣 Easter Play</h1>
    <p>Interactive Word Cloud & Emoji Guessing Game</p>

    <div class="links">
      <a href="/display.html">
        <span class="icon">📺</span>
        Display View (Projector)
      </a>
      <a href="/controller.html">
        <span class="icon">🎮</span>
        Controller (Game Master)
      </a>
      <a href="/player.html">
        <span class="icon">👥</span>
        Player View (Test)
      </a>
    </div>

    <div class="info">
      <strong>How to use:</strong><br>
      1. Open Display on projector<br>
      2. Open Controller on your device<br>
      3. Audience scans QR code to join
    </div>
  </div>
</body>
</html>
